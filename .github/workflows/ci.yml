name: EZ-Inventory CI

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
  pull_request:
    branches:
      - main
      - dev

jobs:
  # ─── Backend CI ───────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend lint
        run: npm run lint

      - name: Run backend tests
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/ez_inventory_test"
          PORT: "5000"
          NODE_ENV: "test"
          FRONTEND_URL: "http://localhost:5173"
        run: npm test

      - name: Build backend (smoke check)
        run: node -e "require('./src/app')" && echo "Backend app loads OK"
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/ez_inventory_test"
          PORT: "5000"
          NODE_ENV: "test"
          FRONTEND_URL: "http://localhost:5173"

  # ─── Frontend CI ──────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: "http://localhost:5000"
