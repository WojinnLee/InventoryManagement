services:
  postgres:
    image: postgres:16
    container_name: ez_inventory_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ez_inventory
    ports:
      - "5433:5432"
    volumes:
      - ez_inventory_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ez_inventory_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ez_inventory
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:5173
    ports:
      - "5050:5000"
    command: >
      sh -c "npx prisma migrate deploy && node src/server.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5050
    container_name: ez_inventory_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  ez_inventory_data:
